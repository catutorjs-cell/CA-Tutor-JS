<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Tutor JS - OTP Verification</title>

    <!-- PWA Manifest & Meta Tags -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#a855f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CA Tutor JS">
    <link rel="apple-touch-icon" href="./assets/logo.png">

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            padding: 12px 20px;
            cursor: pointer;
            margin: 5px;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>CA Tutor JS Email Verification</h2>

    <div id="email-section">
        <input type="email" id="email" placeholder="Enter your email" required>

        <button onclick="sendOTP()">
            Send OTP
        </button>
    </div>

    <div id="otp-section" style="display:none;">
        <input type="text" id="otp" maxlength="6" placeholder="Enter OTP">

        <button onclick="verifyOTP()">
            Verify OTP
        </button>

        <button onclick="resendOTP()">
            Resend OTP
        </button>
    </div>

    <p id="message"></p>

    <script>

        emailjs.init("wwVVazJ7m9EB2dZUf");

        let generatedOTP = "";
        let userEmail = "";

        function generateOTP() {
            return Math.floor(
                100000 + Math.random() * 900000
            ).toString();
        }

        function sendOTP() {

            userEmail =
                document.getElementById("email").value.trim();

            if (!userEmail) {
                showMessage(
                    "Please enter a valid email.",
                    "red"
                );
                return;
            }

            generatedOTP = generateOTP();

            const templateParams = {
                to_email: userEmail,
                otp: generatedOTP
            };

            emailjs.send(
                "service_snsqw0k",
                "template_yuw2suo",
                templateParams
            )
                .then(function () {

                    showMessage(
                        "OTP sent successfully. Check your inbox.",
                        "green"
                    );

                    document.getElementById(
                        "email-section"
                    ).style.display = "none";

                    document.getElementById(
                        "otp-section"
                    ).style.display = "block";

                    console.log("OTP:", generatedOTP);

                })
                .catch(function (error) {

                    console.error(error);

                    showMessage(
                        "Failed to send OTP.",
                        "red"
                    );

                });
        }

        function verifyOTP() {

            const enteredOTP =
                document.getElementById("otp")
                    .value
                    .trim();

            if (enteredOTP === generatedOTP) {

                showMessage(
                    "✅ OTP Verified Successfully!",
                    "green"
                );

            } else {

                showMessage(
                    "❌ Invalid OTP",
                    "red"
                );

            }
        }

        function resendOTP() {
            sendOTP();
        }

        function showMessage(text, color) {

            const msg =
                document.getElementById("message");

            msg.innerHTML = text;
            msg.style.color = color;
        }

    </script>

</body>

</html>
